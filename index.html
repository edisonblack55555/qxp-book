            }
            loadSavedDecksList();
            if (savedDecks.length === 0) {
                alert('暂无保存的阵容');
            }
        }
        
        // 保存槽位到localStorage（包含觉醒状态）
        function saveDeckSlots() {
            const slotsData = {
                cards: deckSlots.map(s => s ? s.CardId : null),
                awakens: [...deckSlotAwaken]
            };
            localStorage.setItem('deckSlots', JSON.stringify(slotsData));
        }
        
        // 加载槽位从localStorage（包含觉醒状态）
        function loadDeckSlots() {
            const savedSlots = localStorage.getItem('deckSlots');
            if (savedSlots) {
                try {
                    const slotsData = JSON.parse(savedSlots);
                    // 兼容旧格式
                    if (Array.isArray(slotsData)) {
                        deckSlots = slotsData.map(id => id ? getCardById(id) : null);
                        deckSlotAwaken = [false, false, false, false, false, false, false, false, false, false];
                    } else {
                        deckSlots = slotsData.cards.map(id => id ? getCardById(id) : null);
                        deckSlotAwaken = slotsData.awakens || [false, false, false, false, false, false, false, false, false, false];
                    }
                    while (deckSlots.length < 10) {
                        deckSlots.push(null);
                    }
                    while (deckSlotAwaken.length < 10) {
                        deckSlotAwaken.push(false);
                    }
                } catch (e) {
                    deckSlots = [null, null, null, null, null, null, null, null, null, null];
                    deckSlotAwaken = [false, false, false, false, false, false, false, false, false, false];
                }
            }
            
            // 加载保存的阵容列表
            const savedDecksData = localStorage.getItem('savedDecks');
            if (savedDecksData) {
                try {
                    savedDecks = JSON.parse(savedDecksData);
                } catch (e) {
                    savedDecks = [];
                }
            }
        }
        
        // 在线搜索阵容
        function searchDeckOnline() {
            const searchTerm = prompt('请输入搜索关键词（卡牌名称）：');
            if (!searchTerm) return;
            
            const results = cardsByKind.sprite.filter(c => 
                c.Name && c.Name.toLowerCase().includes(searchTerm.toLowerCase())
            );
            
            if (results.length === 0) {
                alert('未找到匹配的卡牌');
                return;
            }
            
            if (selectedSlotIndex === -1) {
                selectedSlotIndex = deckSlots.findIndex(s => s === null);
            }
            
            if (selectedSlotIndex === -1) {
                alert('阵容已满');
                return;

            selectCardForSlot(results[0]);

        // 导出我的卡组
        function exportMyDeck() {
            if (myDeck.length === 0) {
                alert('卡组为空，无法导出');
                return;
            }
            
            const cardList = myDeck.map(c => `${c.Name} (${c.CardId})`).join('\\n');
            const text = `我的卡组 (${myDeck.length}张)：\\n${cardList}`;

        // 渲染技能切换按钮

            const container = document.getElementById('skillSwitchContainer');
            const buttonsContainer = document.getElementById('skillSwitchButtons');
            
            // 如果只有一个技能，隐藏切换区域
            if (!char.skills || char.skills.length <= 1) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'block';
            let html = '';
            
            char.skills.forEach((skill, index) => {
                const isMain = skill.isMain;
                const isActive = index === currentSkillIndex;
                html += `<button class="skill-switch-btn ${isMain ? 'main-skill' : ''} ${isActive ? 'active' : ''}" onclick="switchSkill(${index})">${skill.skillName}</button>`;
            });
            
            buttonsContainer.innerHTML = html;
        }
        
        // 切换技能
        function switchSkill(skillIndex) {
            if (!currentCharacterData || !currentCharacterData.skills) return;
            
            currentSkillIndex = skillIndex;
            updateSkillDisplay(currentCharacterData, skillIndex);
            
            // 更新按钮状态
            const buttons = document.querySelectorAll('.skill-switch-btn');
            buttons.forEach((btn, index) => {
                if (index === skillIndex) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

            if (!char.skills || char.skills.length === 0) return;
            
            const skill = char.skills[skillIndex];
            const skillIconPath = `人物/skill${skill.skillId}.png`;
            
            // 更新费用
            document.getElementById('characterDetailFee').textContent = skill.skillFee || '0';
            
            // 更新技能名称
            document.getElementById('characterDetailSkillName').textContent = skill.skillName || '未知技能';
            
            // 更新技能图标

            if (skillImg) {
                // 移除旧的文字回退（如果有）

                const oldSpan = skillIconWrapper.querySelector('span');

                    skillImg.onerror = function() {
                        this.style.display = 'none';
                        const fb = document.createElement('span');
                        fb.style.cssText = 'font-size:12px;font-weight:bold;color:var(--text-light);';
                        fb.textContent = (skill.skillName || '?').substring(0,2);
                        this.parentElement.appendChild(fb);
                    };

        // 执行卡牌搜索
        function doCardSearch() {
            const input = document.getElementById('cardSearchInput');
            if (input) {
                cardSearchKeyword = input.value.trim().toLowerCase();

        // 清除卡牌搜索

        }
        
        // 打开筛选弹窗
        function openFilterModal() {
            const modal = document.getElementById('filterModal');
            const levelSection = document.getElementById('filterLevelSection');
            const typeSection = document.getElementById('filterTypeSection');
            const levelGrid = document.getElementById('filterLevelGrid');
            const typeGrid = document.getElementById('filterTypeGrid');
            
            // 判断是否需要属性筛选
            const needTypeFilter = currentTab === 'sprite' || currentTab === 'deriveSprite';
            
            // 生成星级筛选按钮
            let levelHtml = '';
            for (let i = 1; i <= 6; i++) {
                const isActive = filterState.levels.includes(i);
                levelHtml += `<button class="filter-grid-btn ${isActive ? 'active' : ''}" onclick="toggleLevelFilter(${i})">
                    <span class="filter-level-num">${i}</span><span class="filter-level-label">星</span>
                </button>`;
            }
            levelGrid.innerHTML = levelHtml;
            levelSection.style.display = 'block';
            
            // 生成属性筛选按钮
            if (needTypeFilter) {
                let typeHtml = '';
                availableTypes.forEach(typeId => {
                    const typeInfo = getTypeInfo(typeId);
                    const isActive = filterState.types.includes(typeId);
                    const iconPath = getTypeIconPath(typeId);
                    typeHtml += `<button class="filter-grid-btn ${isActive ? 'active' : ''}" onclick="toggleTypeFilter(${typeId})">
                        <span class="type-icon"><img src="${iconPath}" alt="${typeInfo.Name_cn}" onerror="this.outerHTML='<span style=\\'font-size:12px;font-weight:bold;\\'>${typeInfo.Name_cn.substring(0,1)}</span>'"></span>

                    </button>`;
                });
                typeGrid.innerHTML = typeHtml;
                typeSection.style.display = 'block';
            } else {
                typeSection.style.display = 'none';
            }
            
            modal.classList.add('active');
        }
        
        // 关闭筛选弹窗
        function closeFilterModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('filterModal').classList.remove('active');
        }
        
        // 切换星级筛选
        function toggleLevelFilter(level) {
            const index = filterState.levels.indexOf(level);
            if (index > -1) {
                filterState.levels.splice(index, 1);
            } else {
                filterState.levels.push(level);
            }
            // 更新按钮状态
            openFilterModal();
        }
        
        // 切换属性筛选
        function toggleTypeFilter(typeId) {
            const index = filterState.types.indexOf(typeId);
            if (index > -1) {
                filterState.types.splice(index, 1);
            } else {
                filterState.types.push(typeId);
            }
            // 更新按钮状态
            openFilterModal();
        }
        
        // 重置筛选
        function resetFilters() {
            // 根据当前页面决定重置哪个筛选状态
            if (currentCategory === 'deckBuilder') {
                deckBuilderFilter.levels = [];
                deckBuilderFilter.types = [];
                openDeckBuilderFilterModal();
            } else {
                filterState.levels = [];
                filterState.types = [];
                openFilterModal();
            }
        }
        
        // 应用筛选
        function applyFilters() {
            closeFilterModal();
            // 根据当前页面决定渲染哪个页面
            if (currentCategory === 'deckBuilder') {
                renderDeckBuilder();
            } else {
                renderCardList();
            }
        }
        
        // 获取筛选后的卡牌
        function getFilteredCards() {
            let cards = cardsByKind[currentTab] || [];
            
            // 搜索过滤（卡名或效果）
            if (cardSearchKeyword) {
                cards = cards.filter(card => 
                    (card.Name && card.Name.toLowerCase().includes(cardSearchKeyword)) ||
                    (card.Skill && card.Skill.toLowerCase().includes(cardSearchKeyword)) ||
                    (card.Effect && card.Effect.toLowerCase().includes(cardSearchKeyword))
                );
            }
            
            // 星级筛选
            if (filterState.levels.length > 0) {
                cards = cards.filter(card => filterState.levels.includes(card.Level));
            }
            
            // 属性筛选
            if (filterState.types.length > 0) {
                cards = cards.filter(card => filterState.types.includes(card.Type));
            }
            
            return cards;
        }
        
        // 更新筛选计数显示
        function updateFilteredCount(count) {
            const el = document.getElementById('filteredCount');
            if (el) {
                const total = (cardsByKind[currentTab] || []).length;
                if (count === total) {
                    el.textContent = 'CARD LIST';
                } else {
                    el.textContent = `筛选结果: ${count} / ${total}`;
                }
            }
        }

            if (colValue) colValue.textContent = currentColumns;
            // 更新grid

            if (grid) {
                grid.className = `card-grid-container cols-${currentColumns}`;
            }
        }

        function openCardDetail(card) {
            if (typeof card === 'string') {
                try { card = JSON.parse(card); } catch (e) { console.error('解析卡牌数据失败'); return; }
            }
            
            currentCardData = card;
            isAwakened = false;
            
            const typeInfo = getTypeInfo(card.Type);
            // 法术牌和衍生法术都是法术类型
            const isSpell = card.Kind === '法术牌' || card.Kind === '衍生法术';
            const isAwakenCard = card.Wake === 1;
            const cardImgPath = getCardImagePath(card.CardId);
            
            // 重置UI
            document.getElementById('baseInfo').classList.remove('hide');
            document.getElementById('awakeningInfo').classList.remove('show');
            document.getElementById('awakeningBadge').style.display = 'none';
            document.getElementById('awakeningBtn').classList.remove('awakened');
            document.getElementById('awakeningBtnText').textContent = '查看觉醒';
            
            // 根据当前页面决定是否显示"选择此卡牌"按钮
            const selectCardBtn = document.getElementById('selectCardBtn');
            if (currentCategory === 'deckBuilder' && deckBuilderViewMode === 'builder') {
                selectCardBtn.style.display = 'flex';
            } else {
                selectCardBtn.style.display = 'none';
            }
            
            // 更新卡图
            const modalCardImg = document.getElementById('modalCardImg');
            if (modalCardImg) {
                const wrapper = modalCardImg.parentElement;
                // 移除旧的文字层
                const oldTextLayer = wrapper.querySelector('.card-name-text-layer');
                if (oldTextLayer) oldTextLayer.remove();
                
                if (isNoImgMode) {
                    // 无图模式：隐藏图片，显示文字
                    modalCardImg.style.display = 'none';
                    const tl = document.createElement('div');
                    tl.className = 'card-name-text-layer';
                    tl.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:1;padding:8px;';
                    tl.innerHTML = '<span style="color:var(--primary);font-size:14px;font-weight:600;text-align:center;line-height:1.3;word-break:break-all;">' + (card.Name || '未知卡牌') + '</span>';
                    wrapper.appendChild(tl);
                } else {
                    // 正常模式：显示图片，加载失败显示文字
                    modalCardImg.style.display = '';
                    modalCardImg.src = cardImgPath;
                    modalCardImg.onerror = function() {
                        this.style.display = 'none';
                        const w = this.parentElement;
                        let tl = w.querySelector('.card-name-text-layer');
                        if (!tl) {
                            tl = document.createElement('div');
                            tl.className = 'card-name-text-layer';
                            tl.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:1;padding:8px;';
                            w.appendChild(tl);
                        }
                        tl.innerHTML = '<span style="color:var(--primary);font-size:14px;font-weight:600;text-align:center;line-height:1.3;word-break:break-all;">' + (card.Name || '未知卡牌') + '</span>';
                    };
                }
            }
            
            // 更新左上角图标
            const elementIconContainer = document.getElementById('modalElementIcon');
            if (isSpell) {
                elementIconContainer.className = 'modal-card-element fee-icon';
                elementIconContainer.innerHTML = card.Fee || '-';
                elementIconContainer.style.display = 'flex';
            } else if (isAwakenCard) {
                elementIconContainer.style.display = 'none';
            } else if (card.Type) {
                const iconPath = getTypeIconPath(card.Type);
                elementIconContainer.className = 'modal-card-element';
                if (isNoImgMode) {
                    elementIconContainer.innerHTML = `<span style="font-size:14px;font-weight:bold;color:var(--primary);">${typeInfo.Name_cn}</span>`;
                } else {
                    elementIconContainer.innerHTML = `<img src="${iconPath}" alt="${typeInfo.Name_cn}" onerror="this.outerHTML='<span style=\\'font-size:14px;font-weight:bold;color:var(--primary);\\'>${typeInfo.Name_cn}</span>'">`;
                }
                elementIconContainer.style.display = 'flex';
            } else {
                elementIconContainer.style.display = 'none';
            }
            
            // 更新攻击力/生命值（法术牌隐藏）
            const modalCardStats = document.querySelector('.modal-card-stats');
            if (isSpell) {
                modalCardStats.style.display = 'none';
            } else {
                modalCardStats.style.display = 'flex';
                document.getElementById('modalAttack').textContent = card.Att || '-';
                document.getElementById('modalHP').textContent = card.Hp || '-';
            }
            
            // 更新名称
            document.getElementById('modalCardName').textContent = card.Name || '未命名卡牌';
            
            // 更新属性显示（和图片区域一致）
            const elementBadge = document.getElementById('modalElementBadge');
            const elementBadgeIcon = document.getElementById('modalElementBadgeIcon');
            
            if (isSpell || isAwakenCard) {
                elementBadge.style.display = 'none';
            } else if (card.Type) {
                elementBadge.style.display = 'flex';
                const iconPath = getTypeIconPath(card.Type);
                elementBadgeIcon.innerHTML = `<img src="${iconPath}" alt="${typeInfo.Name_cn}" onerror="this.outerHTML='<span style=\\'font-size:12px;font-weight:bold;color:var(--primary);\\'>${typeInfo.Name_cn}</span>'">`;
                document.getElementById('modalElementName').textContent = typeInfo.Name_cn;
            } else {
                elementBadge.style.display = 'none';
            }
            
            // 更新星级
            document.getElementById('modalStarRow').innerHTML = generateStars(card.Level || 1);
            
            // 更新卡牌信息（法术牌隐藏攻击力和生命值）
            const infoSection = document.querySelector('.base-info .info-section:first-child');
            if (isSpell) {
                infoSection.style.display = 'none';
            } else {
                infoSection.style.display = 'block';
                document.getElementById('infoAttack').textContent = card.Att || '-';
                document.getElementById('infoHP').textContent = card.Hp || '-';
            }
            document.getElementById('skillDesc').textContent = card.Effect || '-';
            
            // 更新觉醒按钮状态
            const awakenBtn = document.getElementById('awakeningBtn');
            if (card.awakenData || isAwakenCard) {
                awakenBtn.disabled = false;
                awakenBtn.style.display = 'flex';
                
                if (isAwakenCard) {
                    awakenBtn.classList.add('awakened');
                    document.getElementById('awakeningBtnText').textContent = '当前为觉醒状态';
                    awakenBtn.disabled = true;
                } else {
                    awakenBtn.classList.remove('awakened');
                    document.getElementById('awakeningBtnText').textContent = '查看觉醒';
                }
                
                const awakenData = card.awakenData || card;
                // 觉醒信息也隐藏法术牌的攻击和生命值
                const awakenInfoSection = document.querySelector('#awakeningInfo .info-section:first-child');
                if (isSpell) {
                    awakenInfoSection.style.display = 'none';
                } else {
                    awakenInfoSection.style.display = 'block';
                    document.getElementById('awakenAttack').textContent = awakenData.Att || '-';
                    document.getElementById('awakenHP').textContent = awakenData.Hp || '-';
                }
                document.getElementById('awakenSkillDesc').textContent = awakenData.Effect || '-';
            } else {
                awakenBtn.style.display = 'flex';
                awakenBtn.disabled = true;
                awakenBtn.classList.remove('awakened');
                document.getElementById('awakeningBtnText').textContent = '无觉醒数据';
            }
            
            document.getElementById('detailModal').classList.add('active');
        }
        
        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('detailModal').classList.remove('active');
            // 关闭弹窗时隐藏选择按钮
            document.getElementById('selectCardBtn').style.display = 'none';
        }
        
        // 从弹窗中选择卡牌（用于阵容推荐页面）
        function selectCardFromModal() {
            if (!currentCardData) return;
            
            // 选择当前显示的卡牌（可能是觉醒版本）
            let cardToSelect = currentCardData;
            if (isAwakened && currentCardData.awakenData) {
                cardToSelect = currentCardData.awakenData;
            }
            
            // 调用选择卡牌函数
            selectCardForSlot(cardToSelect);
            
            // 关闭弹窗
            document.getElementById('detailModal').classList.remove('active');
            document.getElementById('selectCardBtn').style.display = 'none';
        }
        
        function toggleAwakening() {
            if (!currentCardData || !currentCardData.awakenData) return;
            
            isAwakened = !isAwakened;
            
            const baseInfo = document.getElementById('baseInfo');
            const awakeningInfo = document.getElementById('awakeningInfo');
            const awakeningBadge = document.getElementById('awakeningBadge');
            const awakeningBtn = document.getElementById('awakeningBtn');
            const awakeningBtnText = document.getElementById('awakeningBtnText');
            
            const awakenData = currentCardData.awakenData;
            
            // 法术牌和衍生法术都是法术类型
            const isSpell = currentCardData.Kind === '法术牌' || currentCardData.Kind === '衍生法术';
            
            if (isAwakened) {
                baseInfo.classList.add('hide');
                awakeningInfo.classList.add('show');
                awakeningBadge.style.display = 'inline';
                awakeningBtn.classList.add('awakened');
                awakeningBtnText.textContent = '返回基础';
                
                const awImg = document.getElementById('modalCardImg');
                if (awImg) {
                    const awWrapper = awImg.parentElement;
                    const awOldTl = awWrapper.querySelector('.card-name-text-layer');
                    if (awOldTl) awOldTl.remove();
                    if (isNoImgMode) {
                        awImg.style.display = 'none';
                        const tl = document.createElement('div');
                        tl.className = 'card-name-text-layer';
                        tl.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:1;padding:8px;';
                        tl.innerHTML = '<span style="color:var(--primary);font-size:14px;font-weight:600;text-align:center;line-height:1.3;word-break:break-all;">' + (awakenData.Name || '未知卡牌') + '</span>';
                        awWrapper.appendChild(tl);
                    } else {
                        awImg.style.display = '';
                        awImg.src = getCardImagePath(awakenData.CardId);
                        awImg.onerror = function() {
                            this.style.display = 'none';
                            const w = this.parentElement;
                            let tl = w.querySelector('.card-name-text-layer');
                            if (!tl) {
                                tl = document.createElement('div');
                                tl.className = 'card-name-text-layer';
                                tl.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:1;padding:8px;';
                                w.appendChild(tl);
                            }
                            tl.innerHTML = '<span style="color:var(--primary);font-size:14px;font-weight:600;text-align:center;line-height:1.3;word-break:break-all;">' + (awakenData.Name || '未知卡牌') + '</span>';
                        };
                    }
                }
                if (!isSpell) {
                    document.getElementById('modalAttack').textContent = awakenData.Att || '-';
                    document.getElementById('modalHP').textContent = awakenData.Hp || '-';
                }
            } else {
                baseInfo.classList.remove('hide');
                awakeningInfo.classList.remove('show');
                awakeningBadge.style.display = 'none';
                awakeningBtn.classList.remove('awakened');
                awakeningBtnText.textContent = '查看觉醒';
                
                const baseImg = document.getElementById('modalCardImg');
                if (baseImg) {
                    const bWrapper = baseImg.parentElement;
                    const bOldTl = bWrapper.querySelector('.card-name-text-layer');
                    if (bOldTl) bOldTl.remove();
                    if (isNoImgMode) {
                        baseImg.style.display = 'none';
                        const tl = document.createElement('div');
                        tl.className = 'card-name-text-layer';
                        tl.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:1;padding:8px;';
                        tl.innerHTML = '<span style="color:var(--primary);font-size:14px;font-weight:600;text-align:center;line-height:1.3;word-break:break-all;">' + (currentCardData.Name || '未知卡牌') + '</span>';
                        bWrapper.appendChild(tl);
                    } else {
                        baseImg.style.display = '';
                        baseImg.src = getCardImagePath(currentCardData.CardId);
                        baseImg.onerror = function() {
                            this.style.display = 'none';
                            const w = this.parentElement;
                            let tl = w.querySelector('.card-name-text-layer');
                            if (!tl) {
                                tl = document.createElement('div');
                                tl.className = 'card-name-text-layer';
                                tl.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:1;padding:8px;';
                                w.appendChild(tl);
                            }
                            tl.innerHTML = '<span style="color:var(--primary);font-size:14px;font-weight:600;text-align:center;line-height:1.3;word-break:break-all;">' + (currentCardData.Name || '未知卡牌') + '</span>';
                        };
                    }
                }
                if (!isSpell) {
                    document.getElementById('modalAttack').textContent = currentCardData.Att || '-';
                    document.getElementById('modalHP').textContent = currentCardData.Hp || '-';
                }
            }
        }
        
        function toggleNightMode() {
            isNightMode = !isNightMode;
            document.body.classList.toggle('night-mode', isNightMode);
            
            const btn = document.getElementById('nightModeBtn');
            btn.classList.toggle('active', isNightMode);
            btn.textContent = isNightMode ? '☀️ 日间模式' : '🌙 夜间模式';
        }
        
        function toggleNoImgMode() {
            isNoImgMode = !isNoImgMode;
            document.body.classList.toggle('no-img-mode', isNoImgMode);
            
            const btn = document.getElementById('noImgModeBtn');
            btn.classList.toggle('active', isNoImgMode);
            btn.textContent = isNoImgMode ? '🖼️ 图片模式' : '📝 无图模式';
            
            // 重新渲染当前页面
            renderContent(currentCategory);
        }
        
        // 为所有img标签注入no-img-fallback文字（用于无图模式下显示替代文字）
        function injectNoImgFallbacks() {
            document.querySelectorAll('img').forEach(img => {
                if (img.parentElement && !img.parentElement.querySelector('.no-img-fallback')) {
                    const alt = img.getAttribute('alt') || '?';
                    const fb = document.createElement('span');
                    fb.className = 'no-img-fallback';
                    fb.style.cssText = 'align-items:center;justify-content:center;color:var(--primary);font-size:11px;font-weight:600;text-align:center;line-height:1.3;word-break:break-all;padding:4px;';
                    fb.textContent = alt;
                    img.parentElement.appendChild(fb);
                }
            });
        }
        
        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeCharacterDetailModal();
            }
        });
        
        // 回到顶端功能
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
        
        // 滚动监听 - 显示/隐藏回到顶端按钮
        window.addEventListener('scroll', function() {
            const backToTopBtn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('show');
            } else {
                backToTopBtn.classList.remove('show');
            }
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', initData);

        // ==================== Deck Preview Modal Functions ====================
        function previewDeck(index) {
            const deck = savedDecks[index];
            if (!deck || !deck.cards) return;
            
            document.getElementById('deckPreviewTitle').textContent = deck.name || '阵容预览';
            const grid = document.getElementById('deckPreviewGrid');
            
            const awakens = deck.awakens || [];
            
            let html = '';
            for (let slotIndex = 0; slotIndex < 10; slotIndex++) {
                const cardId = deck.cards[slotIndex];
                const isAwaken = awakens[slotIndex] === true;
                
                if (!cardId) {
                    html += `
                        <div class="deck-preview-card-item empty-slot">
                            <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:14px;">空槽位</div>
                        </div>
                    `;
                    continue;
                }
                
                const card = getCardById(cardId);
                if (!card) {
                    html += `
                        <div class="deck-preview-card-item empty-slot">
                            <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:13px;">未知卡牌<br>${cardId}</div>
                        </div>
                    `;
                    continue;
                }
                
                // 判断是否使用觉醒卡牌
                let displayCard = card;
                if (isAwaken && card.awakenData) {
                    displayCard = card.awakenData;
                }
                
                const cardPath = getCardImagePath(displayCard.CardId || cardId);
                const typeInfo = getTypeInfo(displayCard.Type);
                const typeIconPath = getTypeIconPath(displayCard.Type);
                const fee = displayCard.Fee || 0;
                const attack = displayCard.Att || 0;
                const hp = displayCard.Hp || 0;
                const level = displayCard.Level || 1;
                
                // 属性图标
                let elementHtml = '';
                if (displayCard.Type) {
                    elementHtml = `<div class="card-element-icon"><img src="${typeIconPath}" alt="${typeInfo.Name_cn}" onerror="this.outerHTML='<span style=\'font-size:10px;font-weight:bold;\'>${typeInfo.Name_cn ? typeInfo.Name_cn.substring(0,1) : '?'}' </span>'"></div>`;
                } else {
                    elementHtml = `<div class="card-element-icon fee-icon">${fee}</div>`;
                }
                
                // 觉醒样式类
                const awakenClass = isAwaken ? ' awakened' : '';
                
                html += `
                    <div class="deck-preview-card-item${awakenClass}" onclick="event.stopPropagation()">
                        <div class="card-image-wrapper">
                            ${elementHtml}
                            <div class="card-level-badge"><span class="star-icon">★</span>${level}</div>
                            <img src="${cardPath}" alt="${displayCard.Name || '卡牌'}" onerror="this.style.display='none'">
                            <div class="card-bottom-overlay">
                                <div class="card-name-text">${displayCard.Name || '未知卡牌'}</div>
                                <div class="card-stats-row">
                                    <div class="card-stat attack">${attack}</div>
                                    <div class="card-stat hp">${hp}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
            document.getElementById('deckPreviewOverlay').classList.add('active');
        }
        
        function closeDeckPreview(event) {
            document.getElementById('deckPreviewOverlay').classList.remove('active');
        }

    </script>
    <!-- 回到顶端按钮 -->
    <button class="back-to-top" id="backToTop" onclick="scrollToTop()" title="回到顶端">↑</button>
    <!-- Deck Preview Modal -->
    <div class="deck-preview-overlay" id="deckPreviewOverlay" onclick="closeDeckPreview(event)">
        <div class="deck-preview-modal" onclick="event.stopPropagation()">
            <div class="deck-preview-header">
                <div class="deck-preview-title" id="deckPreviewTitle">阵容预览</div>
                <button class="deck-preview-close" onclick="closeDeckPreview()">&times;</button>
            </div>
            <div class="deck-preview-grid" id="deckPreviewGrid">
                <!-- Dynamically generated 10 cards -->
            </div>
        </div>
    </div>

</body>
</html>
